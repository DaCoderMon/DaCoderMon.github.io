<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>p5 Shader Effects</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.umd.min.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
<script>

let img,sh,pg;
let params={
effect:"visual_1",
amount:1,
save_png:function(){saveCanvas("export","png")},
save_jpg:function(){saveCanvas("export","jpg")},
save_jpeg:function(){saveCanvas("export","jpeg")}
};

let effects=[];

function preload(){
img=loadImage("https://archive.org/download/nices-1/nices-1.png");
}

function setup(){
createCanvas(windowWidth,windowHeight,WEBGL);
noStroke();
pg=createGraphics(windowWidth,windowHeight,WEBGL);
pg.noStroke();

sh=createShader(vs,fs);
pg.shader(sh);

for(let i=1;i<=60;i++)effects.push("visual_"+i);
for(let i=1;i<=60;i++)effects.push("math_"+i);

let gui=new lil.GUI();
gui.add(params,"effect",effects);
gui.add(params,"amount",0,5,0.001);
gui.add(params,"save_png");
gui.add(params,"save_jpg");
gui.add(params,"save_jpeg");
}

function windowResized(){
resizeCanvas(windowWidth,windowHeight);
pg.resizeCanvas(windowWidth,windowHeight);
}

function draw(){
pg.shader(sh);
sh.setUniform("tex0",img);
sh.setUniform("resolution",[width,height]);
sh.setUniform("time",millis()/1000);
sh.setUniform("amount",params.amount);
sh.setUniform("effectIndex",effects.indexOf(params.effect));
pg.rect(-width/2,-height/2,width,height);
image(pg,-width/2,-height/2,width,height);
}

const vs=`
precision mediump float;
attribute vec3 aPosition;
attribute vec2 aTexCoord;
varying vec2 vTexCoord;
void main(){
vTexCoord=aTexCoord;
vec4 positionVec4=vec4(aPosition,1.0);
gl_Position=positionVec4;
}
`;

const fs=`
precision mediump float;
uniform sampler2D tex0;
uniform vec2 resolution;
uniform float time;
uniform float amount;
uniform int effectIndex;
varying vec2 vTexCoord;

vec3 rgb2hsv(vec3 c){
vec4 K=vec4(0.,-1./3.,2./3.,-1.);
vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
float d=q.x-min(q.w,q.y);
float e=1e-10;
return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
}

vec3 hsv2rgb(vec3 c){
vec3 p=abs(fract(c.xxx+vec3(0.,2./3.,1./3.))*6.-3.);
return c.z*mix(vec3(1.),clamp(p-1.,0.,1.),c.y);
}

void main(){
vec2 uv=vTexCoord;
vec4 col=texture2D(tex0,uv);
vec2 p=uv*2.-1.;
float r=length(p);
float a=atan(p.y,p.x);

if(effectIndex<60){
int i=effectIndex;
if(i==0)col.rgb=vec3(dot(col.rgb,vec3(.299,.587,.114)));
else if(i==1)col.rgb=1.-col.rgb;
else if(i==2)col.rgb=col.bgr;
else if(i==3)col.rgb=pow(col.rgb,vec3(2.2));
else if(i==4)col.rgb=sqrt(col.rgb);
else if(i==5)col.rgb=col.rgb*vec3(1.,0.5,0.5);
else if(i==6)col.rgb=col.rgb*vec3(0.5,1.,0.5);
else if(i==7)col.rgb=col.rgb*vec3(0.5,0.5,1.);
else if(i==8)col.rgb=vec3(col.r);
else if(i==9)col.rgb=vec3(col.g);
else if(i==10)col.rgb=vec3(col.b);
else if(i==11)col.rgb=fract(col.rgb*2.);
else if(i==12)col.rgb=sin(col.rgb*3.14);
else if(i==13)col.rgb=cos(col.rgb*3.14);
else if(i==14)col.rgb=tan(col.rgb*1.2);
else if(i==15)col.rgb=abs(col.rgb-0.5)*2.;
else if(i==16)col.rgb=normalize(col.rgb);
else if(i==17)col.rgb=vec3(length(col.rgb));
else if(i==18)col.rgb=vec3(max(col.r,max(col.g,col.b)));
else if(i==19)col.rgb=vec3(min(col.r,min(col.g,col.b)));
else if(i==20)col.rgb=vec3(step(.5,col.r),step(.5,col.g),step(.5,col.b));
else if(i==21)col.rgb=col.rgb*amount;
else if(i==22)col.rgb=pow(col.rgb,vec3(amount));
else if(i==23)col.rgb=col.rgb/(col.rgb+1.);
else if(i==24)col.rgb=col.rgb*(1.-col.rgb);
else if(i==25)col.rgb=col.rgb+sin(time);
else if(i==26)col.rgb=col.rgb+cos(time);
else if(i==27)col.rgb=col.rgb+tan(time*0.2);
else if(i==28)col.rgb=fract(col.rgb+time);
else if(i==29)col.rgb=abs(sin(col.rgb+time));
else if(i==30)col.rgb=abs(cos(col.rgb+time));
else if(i==31)col.rgb=vec3(dot(col.rgb,vec3(.333)));
else if(i==32)col.rgb=col.rgb*vec3(1.,sin(time),cos(time));
else if(i==33)col.rgb=col.rgb*vec3(cos(time),1.,sin(time));
else if(i==34)col.rgb=col.rgb*vec3(sin(time),cos(time),1.);
else if(i==35){vec3 h=rgb2hsv(col.rgb);h.x+=time*0.1;col.rgb=hsv2rgb(h);}
else if(i==36){vec3 h=rgb2hsv(col.rgb);h.y*=2.;col.rgb=hsv2rgb(h);}
else if(i==37){vec3 h=rgb2hsv(col.rgb);h.z*=2.;col.rgb=hsv2rgb(h);}
else if(i==38)col.rgb=vec3(r);
else if(i==39)col.rgb=vec3(a/3.1416);
else if(i==40)col.rgb=vec3(r+a);
else if(i==41)col.rgb=vec3(sin(r*10.));
else if(i==42)col.rgb=vec3(cos(r*10.));
else if(i==43)col.rgb=vec3(tan(r*2.));
else if(i==44)col.rgb=vec3(fract(r*5.));
else if(i==45)col.rgb=vec3(step(.5,fract(r*5.)));
else if(i==46)col.rgb=vec3(abs(p.x));
else if(i==47)col.rgb=vec3(abs(p.y));
else if(i==48)col.rgb=vec3(abs(p.x*p.y));
else if(i==49)col.rgb=vec3(abs(p.x+p.y));
else if(i==50)col.rgb=vec3(abs(p.x-p.y));
else if(i==51)col.rgb=vec3(length(p));
else if(i==52)col.rgb=vec3(distance(p,vec2(0)));
else if(i==53)col.rgb=vec3(dot(p,p));
else if(i==54)col.rgb=vec3(fract(dot(p,p)*10.));
else if(i==55)col.rgb=vec3(step(.3,fract(dot(p,p)*10.)));
else if(i==56)col.rgb=vec3(sin(p.x*10.));
else if(i==57)col.rgb=vec3(cos(p.y*10.));
else if(i==58)col.rgb=vec3(tan((p.x+p.y)*2.));
else if(i==59)col.rgb=vec3(sin(p.x*10.)*cos(p.y*10.));
}
else{
int j=effectIndex-60;
if(j==0)uv+=sin(uv*10.+time)*0.02*amount;
else if(j==1)uv+=cos(uv*10.+time)*0.02*amount;
else if(j==2)uv+=tan(uv*2.+time)*0.005*amount;
else if(j==3)uv+=normalize(uv-.5)*sin(time)*0.1*amount;
else if(j==4)uv+=normalize(uv-.5)*cos(time)*0.1*amount;
else if(j==5)uv+=normalize(uv-.5)*tan(time*0.3)*0.05*amount;
else if(j==6)uv+=vec2(sin(uv.y*20.),0.)*0.02;
else if(j==7)uv+=vec2(0.,cos(uv.x*20.))*0.02;
else if(j==8)uv+=vec2(sin(time+uv.y*10.),cos(time+uv.x*10.))*0.02;
else if(j==9)uv+=vec2(cos(time+uv.y*10.),sin(time+uv.x*10.))*0.02;
else if(j==10)uv+=vec2(tan(time+uv.y*3.),tan(time+uv.x*3.))*0.01;
else if(j==11)uv+=vec2(fract(uv.x*5.),fract(uv.y*5.))*0.02;
else if(j==12)uv+=vec2(step(.5,fract(uv.x*5.)),step(.5,fract(uv.y*5.)))*0.02;
else if(j==13)uv+=vec2(abs(sin(uv.x*10.)),abs(cos(uv.y*10.)))*0.02;
else if(j==14)uv+=vec2(abs(cos(uv.x*10.)),abs(sin(uv.y*10.)))*0.02;
else if(j==15)uv+=vec2(length(uv-.5))*0.05;
else if(j==16)uv+=vec2(distance(uv,.5))*0.05;
else if(j==17)uv+=vec2(dot(uv,uv))*0.05;
else if(j==18)uv+=vec2(fract(dot(uv,uv)*10.))*0.05;
else if(j==19)uv+=vec2(step(.3,fract(dot(uv,uv)*10.)))*0.05;
else if(j==20)uv+=vec2(sin(length(uv-.5)*20.))*0.02;
else if(j==21)uv+=vec2(cos(length(uv-.5)*20.))*0.02;
else if(j==22)uv+=vec2(tan(length(uv-.5)*5.))*0.01;
else if(j==23)uv+=vec2(fract(length(uv-.5)*5.))*0.02;
else if(j==24)uv+=vec2(step(.5,fract(length(uv-.5)*5.)))*0.02;
else if(j==25)uv+=vec2(p.x*p.y)*0.1;
else if(j==26)uv+=vec2(p.x+p.y)*0.05;
else if(j==27)uv+=vec2(p.x-p.y)*0.05;
else if(j==28)uv+=vec2(abs(p.x*p.y))*0.1;
else if(j==29)uv+=vec2(abs(p.x+p.y))*0.05;
else if(j==30)uv+=vec2(abs(p.x-p.y))*0.05;
else if(j==31)uv+=vec2(sin(p.x*10.)*cos(p.y*10.))*0.05;
else if(j==32)uv+=vec2(cos(p.x*10.)*sin(p.y*10.))*0.05;
else if(j==33)uv+=vec2(tan(p.x*2.)*tan(p.y*2.))*0.02;
else if(j==34)uv+=vec2(fract(p.x*5.)*fract(p.y*5.))*0.05;
else if(j==35)uv+=vec2(step(.5,fract(p.x*5.))*step(.5,fract(p.y*5.)))*0.05;
else if(j==36)uv+=vec2(sin(time+p.x*10.))*0.05;
else if(j==37)uv+=vec2(cos(time+p.y*10.))*0.05;
else if(j==38)uv+=vec2(tan(time+p.x*3.))*0.02;
else if(j==39)uv+=vec2(fract(time+p.y*3.))*0.05;
else if(j==40)uv+=vec2(step(.5,fract(time+p.x*3.)))*0.05;
else if(j==41)uv+=vec2(length(p))*0.1;
else if(j==42)uv+=vec2(distance(p,vec2(0)))*0.1;
else if(j==43)uv+=vec2(dot(p,p))*0.1;
else if(j==44)uv+=vec2(fract(dot(p,p)*5.))*0.1;
else if(j==45)uv+=vec2(step(.5,fract(dot(p,p)*5.)))*0.1;
else if(j==46)uv+=vec2(sin(dot(p,p)*10.))*0.05;
else if(j==47)uv+=vec2(cos(dot(p,p)*10.))*0.05;
else if(j==48)uv+=vec2(tan(dot(p,p)*2.))*0.02;
else if(j==49)uv+=vec2(fract(dot(p,p)*3.))*0.05;
else if(j==50)uv+=vec2(step(.5,fract(dot(p,p)*3.)))*0.05;
else if(j==51)uv+=vec2(sin(a*10.))*0.05;
else if(j==52)uv+=vec2(cos(a*10.))*0.05;
else if(j==53)uv+=vec2(tan(a*2.))*0.02;
else if(j==54)uv+=vec2(fract(a*3.))*0.05;
else if(j==55)uv+=vec2(step(.5,fract(a*3.)))*0.05;
else if(j==56)uv+=vec2(sin(r*10.))*0.05;
else if(j==57)uv+=vec2(cos(r*10.))*0.05;
else if(j==58)uv+=vec2(tan(r*2.))*0.02;
else if(j==59)uv+=vec2(fract(r*3.))*0.05;
col=texture2D(tex0,uv);
}

gl_FragColor=col;
}
`;

</script>
</body>
</html>
